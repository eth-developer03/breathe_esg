[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py seed_demo"

[deploy]
startCommand = "gunicorn breathe.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/api/me/"
restartPolicyType = "on_failure"
