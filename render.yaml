services:
  # Django backend
  - type: web
    name: breathe-esg-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn breathe.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: breathe.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

  # React frontend (static site)
  - type: web
    name: breathe-esg-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://breathe-esg-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
    plan: free
